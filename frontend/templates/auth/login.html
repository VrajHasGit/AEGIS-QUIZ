<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CLUELY.AI | Instructor Portal</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/awwwards.css') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Stardos+Stencil:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      background-image: url("{{ url_for('static', filename='images/bg.png') }}");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    
    .zine-wrapper {
      width: 100%;
      max-width: 550px;
      padding: 20px;
      filter: drop-shadow(12px 15px 0px rgba(0,0,0,0.9));
    }

    .zine-paper {
      background-color: #f4f1ea;
      color: #1a1a1a;
      padding: 60px 50px;
      position: relative;
      /* Torn edges simulation */
      clip-path: polygon(2% 1%, 98% 3%, 99% 98%, 1% 99%);
      transform: rotate(-1.5deg);
      box-shadow: inset 0 0 60px rgba(0,0,0,0.15);
      /* Risograph noise texture */
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.25'/%3E%3C/svg%3E");
      text-align: center;
    }

    .display-text {
      font-family: 'Stardos Stencil', cursive;
      font-size: clamp(3.5rem, 10vw, 5rem);
      color: #0f0f0f;
      text-transform: uppercase;
      transform: rotate(-3deg);
      display: inline-block;
      margin-bottom: 10px;
      letter-spacing: -2px;
      text-shadow: 3px 3px 0px rgba(0,0,0,0.3);
    }

    .display-text span {
      font-family: 'Special Elite', monospace;
      font-size: 0.5em;
      vertical-align: top;
      color: #0047FF;
      mix-blend-mode: multiply;
    }

    .subtitle {
      font-family: 'Special Elite', monospace;
      color: #111;
      font-size: 1.2rem;
      font-weight: bold;
      transform: rotate(2deg);
      margin-bottom: 40px;
      display: inline-block;
      border-bottom: 3px solid #111;
      border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
      padding-bottom: 5px;
    }

    .tab-switcher {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 40px;
    }

    .tab-btn {
      background: transparent;
      border: 2px dashed rgba(0,0,0,0.3);
      color: #444;
      font-family: 'Special Elite', monospace;
      font-size: 0.9rem;
      padding: 10px 20px;
      cursor: pointer;
      transform: rotate(1deg);
      transition: all 0.2s;
    }

    .tab-btn.active {
      color: #111;
      border: 3px solid #111;
      font-weight: bold;
      transform: rotate(-2deg);
      background: rgba(0,0,0,0.05);
      border-radius: 15px 225px 15px 255px/255px 15px 225px 15px;
      box-shadow: 4px 4px 0px rgba(0,0,0,0.2);
    }

    .form-panel {
      display: none;
    }

    .form-panel.active {
      display: block;
      animation: stampIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes stampIn {
      from { opacity: 0; transform: scale(1.1) rotate(2deg); }
      to { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    .field-group {
      margin-bottom: 25px;
      text-align: left;
    }

    .label-text {
      font-family: 'Special Elite', monospace;
      font-weight: bold;
      font-size: 1rem;
      color: #111;
      display: inline-block;
      transform: rotate(-1deg);
      margin-bottom: 8px;
    }

    .input-field {
      width: 100%;
      background: rgba(0,0,0,0.02);
      border: none;
      border-bottom: 4px solid #111;
      border-right: 2px solid #111;
      border-radius: 255px 5px 225px 5px/5px 225px 5px 255px;
      padding: 15px;
      color: #111;
      font-family: 'Special Elite', monospace;
      font-size: 1.2rem;
      box-shadow: 2px 2px 0px rgba(0,0,0,0.1);
    }
    
    .input-field:focus {
      outline: none;
      background: rgba(0,71,255,0.05);
      border-color: #0047FF;
    }

    .input-field::placeholder {
      color: rgba(0,0,0,0.4);
    }

    .submit-btn-wrap {
      margin-top: 50px;
    }

    .btn-zine {
      width: 100%;
      background: transparent;
      color: #0047FF;
      border: 5px solid #0047FF;
      font-family: 'Stardos Stencil', cursive;
      font-size: 2rem;
      padding: 15px 20px;
      text-transform: uppercase;
      transform: rotate(-2deg);
      mix-blend-mode: multiply;
      border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
      cursor: pointer;
      transition: all 0.1s;
      box-shadow: 5px 5px 0px rgba(0,71,255,0.3);
    }

    .btn-zine:hover {
      transform: rotate(0deg) scale(1.02);
      box-shadow: 8px 8px 0px rgba(0,71,255,0.5);
      background: rgba(0,71,255,0.1);
    }
    
    .btn-zine:active {
      transform: translate(3px, 3px);
      box-shadow: 2px 2px 0px rgba(0,71,255,0.5);
    }

    .flash-alert {
      font-family: 'Special Elite', monospace;
      padding: 15px;
      margin-bottom: 30px;
      border: 3px solid #111;
      background: #ffdb58;
      color: #111;
      transform: rotate(1.5deg);
      border-radius: 5px 255px 3px 225px / 255px 5px 225px 3px;
      box-shadow: 3px 3px 0px rgba(0,0,0,0.2);
    }
    
    .flash-success {
      background: #a8e6cf;
    }
    
    .student-link {
      font-family: 'Special Elite', monospace;
      color: #111;
      font-weight: bold;
      text-decoration: none;
      border-bottom: 2px dashed #111;
      padding-bottom: 2px;
      display: inline-block;
      transform: rotate(-1deg);
      transition: color 0.2s;
    }
    
    .student-link:hover {
      color: #0047FF;
      border-color: #0047FF;
    }
  </style>
</head>
<body>

  <div class="zine-wrapper">
    <div class="zine-paper">
      
      <h1 class="display-text">CLUELY<span>.AI</span></h1>
      <br>
      <p class="subtitle">Instructor Control Node</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="flash-alert {% if category == 'success' %}flash-success{% endif %}">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <div class="tab-switcher">
        <button class="tab-btn active" onclick="switchTab('login')">Authenticate</button>
        <button class="tab-btn" onclick="switchTab('register')">Init Account</button>
      </div>

      <div id="panel-login" class="form-panel active">
        <form action="{{ url_for('login') }}" method="POST">
          <div class="field-group">
            <label for="login-email" class="label-text">Identifier (Email)</label>
            <input type="email" id="login-email" name="email" class="input-field" placeholder="instructor@cluely.ai" required>
          </div>
          <div class="field-group">
            <label for="login-password" class="label-text">Security Key</label>
            <input type="password" id="login-password" name="password" class="input-field" placeholder="••••••••" required>
          </div>
          <div class="submit-btn-wrap">
            <button type="submit" class="btn-zine">ACCESS NODE</button>
          </div>
        </form>
      </div>

      <div id="panel-register" class="form-panel">
        <form action="{{ url_for('register') }}" method="POST" onsubmit="return validateReg()">
          <div class="field-group">
            <label for="reg-name" class="label-text">Full Name</label>
            <input type="text" id="reg-name" name="username" class="input-field" placeholder="Dr. Jane Doe" required>
          </div>
          <div class="field-group">
            <label for="reg-email" class="label-text">Identifier (Email)</label>
            <input type="email" id="reg-email" name="email" class="input-field" placeholder="instructor@cluely.ai" required>
          </div>
          <div class="field-group">
            <label for="reg-pass" class="label-text">Security Key</label>
            <input type="password" id="reg-pass" name="password" class="input-field" placeholder="••••••••" required minlength="6">
          </div>
          <div class="field-group">
            <label for="reg-confirm" class="label-text">Verify Key</label>
            <input type="password" id="reg-confirm" name="confirm_password" class="input-field" placeholder="••••••••" required minlength="6">
          </div>
          <div class="submit-btn-wrap">
            <button type="submit" class="btn-zine">CREATE NODE</button>
          </div>
        </form>
      </div>
      
      <div style="margin-top: 40px;">
        <a href="{{ url_for('join_quiz') }}" class="student-link">>>> Student Access Portal</a>
      </div>

    </div>
  </div>

  <script>
    function switchTab(tabId) {
      document.querySelectorAll('.tab-btn').forEach(function(btn) {
        btn.classList.remove('active');
      });
      document.querySelectorAll('.form-panel').forEach(function(panel) {
        panel.classList.remove('active');
      });
      event.target.classList.add('active');
      document.getElementById('panel-' + tabId).classList.add('active');
    }

    function validateReg() {
      var p1 = document.getElementById('reg-pass').value;
      var p2 = document.getElementById('reg-confirm').value;
      if (p1 !== p2) {
        alert("SECURITY KEYS DO NOT MATCH.");
        return false;
      }
      return true;
    }
  </script>
</body>
</html>
