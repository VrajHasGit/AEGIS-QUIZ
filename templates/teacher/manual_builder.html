<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manual Quiz Builder | AegisQuiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #060b18;
      --surface: rgba(15, 23, 42, 0.85);
      --border: rgba(99, 120, 180, 0.15);
      --accent: #4f7ef8;
      --text: #f1f5f9;
      --muted: #64748b;
      --success: #10b981;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
      position: relative;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(79,126,248,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,126,248,0.03) 1px, transparent 1px);
      background-size: 50px 50px; pointer-events: none;
    }

    .navbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(6,11,24,0.9);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(20px);
      padding: 0 24px; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .brand-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px;
    }
    .brand-name { font-size: 1.1rem; font-weight: 800; color: var(--text); }
    .nav-tag {
      font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;
      color: var(--accent); background: rgba(79,126,248,0.1);
      border: 1px solid rgba(79,126,248,0.25); border-radius: 100px; padding: 3px 10px;
    }

    .main { max-width: 800px; margin: 0 auto; padding: 40px 24px 80px; }

    .page-header { margin-bottom: 32px; }
    .page-title { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
    .page-sub { font-size: 0.88rem; color: var(--muted); }

    /* Cards */
    .builder-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px; padding: 28px;
      backdrop-filter: blur(20px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      margin-bottom: 20px;
      animation: slideUp 0.5s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .section-label {
      font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 2px;
      color: var(--muted); margin-bottom: 20px;
      display: flex; align-items: center; gap: 10px;
    }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .field-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 14px; }
    .field-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    .field-group { display: flex; flex-direction: column; gap: 6px; }
    .field-label {
      font-size: 0.75rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 1px; color: var(--muted);
    }
    .field-input {
      background: rgba(255,255,255,0.04);
      border: 1.5px solid var(--border);
      border-radius: 10px; padding: 10px 14px;
      color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.875rem;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }
    .field-input::placeholder { color: rgba(100,116,139,0.6); }
    .field-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,126,248,0.12); }

    /* Question block */
    .question-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 16px; padding: 24px;
      margin-bottom: 16px;
      animation: slideUp 0.4s cubic-bezier(0.22,1,0.36,1) both;
      transition: box-shadow 0.2s;
    }
    .question-block:hover { box-shadow: 0 8px 30px rgba(0,0,0,0.3); }

    .q-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 14px;
    }
    .q-label { font-size: 0.78rem; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 1.5px; }

    .btn-remove {
      width: 28px; height: 28px; border-radius: 7px;
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2);
      color: #fca5a5; font-size: 0.85rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .btn-remove:hover { background: rgba(239,68,68,0.25); color: white; }

    .q-input {
      width: 100%; margin-bottom: 14px;
    }

    .correct-select {
      background: rgba(255,255,255,0.04);
      border: 1.5px solid var(--border);
      border-radius: 10px; padding: 9px 14px;
      color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.875rem;
      outline: none; cursor: pointer;
      transition: border-color 0.2s;
      margin-top: 12px;
    }
    .correct-select:focus { border-color: var(--success); }

    /* Option inputs with letter badges */
    .option-row {
      display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
    }
    .option-badge {
      width: 28px; height: 28px; border-radius: 7px;
      background: rgba(79,126,248,0.1); border: 1px solid rgba(79,126,248,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.78rem; font-weight: 700; color: var(--accent);
      flex-shrink: 0;
    }

    /* Bottom actions */
    .bottom-actions {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
      background: rgba(6,11,24,0.97);
      border-top: 1px solid var(--border);
      backdrop-filter: blur(20px);
      padding: 16px 24px;
    }
    .actions-inner {
      max-width: 800px; margin: 0 auto;
      display: flex; gap: 12px;
    }
    .btn-add-q {
      flex: 1; padding: 12px;
      background: rgba(79,126,248,0.08);
      border: 1.5px dashed rgba(79,126,248,0.3);
      border-radius: 12px; color: var(--accent);
      font-family: 'Inter', sans-serif; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: all 0.25s;
    }
    .btn-add-q:hover { background: rgba(79,126,248,0.14); border-color: rgba(79,126,248,0.5); }

    .btn-publish {
      flex: 1; padding: 12px;
      background: linear-gradient(135deg, var(--success), #059669);
      border: none; border-radius: 12px;
      color: white; font-family: 'Inter', sans-serif;
      font-size: 0.9rem; font-weight: 700; cursor: pointer;
      transition: all 0.3s;
    }
    .btn-publish:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(16,185,129,0.4); }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/dashboard" class="nav-brand">
      <div class="brand-icon">🛡️</div>
      <span class="brand-name">AegisQuiz</span>
    </a>
    <span class="nav-tag">Manual Builder</span>
  </nav>

  <div class="main">
    <div class="page-header">
      <div class="page-title">Create Manual Quiz</div>
      <div class="page-sub">Hand-craft every question with full curriculum control</div>
    </div>

    <form action="/teacher/create-manual" method="POST">
      <!-- Quiz Info -->
      <div class="builder-card">
        <div class="section-label">Quiz Information</div>
        <div class="field-grid" style="margin-bottom: 14px;">
          <div class="field-group">
            <label class="field-label">Quiz Title</label>
            <input type="text" name="quiz_title" class="field-input" placeholder="e.g. Midterm History Exam" required />
          </div>
          <div class="field-group">
            <label class="field-label">Topic</label>
            <input type="text" name="topic" class="field-input" placeholder="e.g. Ancient Rome" required />
          </div>
          <div class="field-group">
            <label class="field-label">Duration (min)</label>
            <input type="number" name="duration" class="field-input" placeholder="30" min="1" required />
          </div>
        </div>
      </div>

      <!-- Questions -->
      <div id="question-container">
        <div class="question-block" id="q-block-1">
          <div class="q-header">
            <span class="q-label">Question 1</span>
          </div>
          <input type="text" name="question[]" class="field-input q-input" placeholder="Write your question here..." required />
          <div class="field-grid-2">
            <div class="option-row">
              <div class="option-badge">A</div>
              <input type="text" name="opt_a[]" class="field-input" placeholder="Option A" required />
            </div>
            <div class="option-row">
              <div class="option-badge">B</div>
              <input type="text" name="opt_b[]" class="field-input" placeholder="Option B" required />
            </div>
            <div class="option-row">
              <div class="option-badge">C</div>
              <input type="text" name="opt_c[]" class="field-input" placeholder="Option C" required />
            </div>
            <div class="option-row">
              <div class="option-badge">D</div>
              <input type="text" name="opt_d[]" class="field-input" placeholder="Option D" required />
            </div>
          </div>
          <select name="correct[]" class="correct-select">
            <option value="A">✓ Correct Answer: A</option>
            <option value="B">✓ Correct Answer: B</option>
            <option value="C">✓ Correct Answer: C</option>
            <option value="D">✓ Correct Answer: D</option>
          </select>
        </div>
      </div>

      <div style="height: 80px;"></div>

      <div class="bottom-actions">
        <div class="actions-inner">
          <button type="button" class="btn-add-q" onclick="addQuestion()">+ Add Question</button>
          <button type="submit" class="btn-publish">🚀 Publish Quiz</button>
        </div>
      </div>
    </form>
  </div>

  <script>
    let questionCount = 1;

    function addQuestion() {
      questionCount++;
      const container = document.getElementById("question-container");
      const original = document.getElementById("q-block-1");
      const newBlock = original.cloneNode(true);

      newBlock.id = `q-block-${questionCount}`;
      newBlock.querySelector(".q-label").innerText = `Question ${questionCount}`;
      newBlock.querySelectorAll("input").forEach(i => i.value = "");

      // Add remove button
      const header = newBlock.querySelector(".q-header");
      if (!header.querySelector('.btn-remove')) {
        const removeBtn = document.createElement('button');
        removeBtn.type = 'button';
        removeBtn.className = 'btn-remove';
        removeBtn.innerHTML = '✕';
        removeBtn.onclick = () => {
          newBlock.style.transition = 'opacity 0.3s, transform 0.3s';
          newBlock.style.opacity = '0';
          newBlock.style.transform = 'translateY(-10px)';
          setTimeout(() => { newBlock.remove(); renumberQuestions(); }, 300);
        };
        header.appendChild(removeBtn);
      }

      container.appendChild(newBlock);
      newBlock.scrollIntoView({ behavior: "smooth", block: "center" });
    }

    function renumberQuestions() {
      document.querySelectorAll('.question-block').forEach((block, i) => {
        block.querySelector('.q-label').innerText = `Question ${i + 1}`;
      });
      questionCount = document.querySelectorAll('.question-block').length;
    }
  </script>
</body>
</html>
