<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manual Quiz Builder | AegisQuiz</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary-dark: #1a1a2e;
        --accent-blue: #3f51b5;
      }
      body {
        background-color: #f0f2f5;
      }
      .navbar {
        background-color: var(--primary-dark);
      }
      .builder-card {
        border-radius: 15px;
        border: none;
      }
      .question-block {
        background: #fff;
        border-left: 5px solid var(--accent-blue);
        transition: all 0.3s ease;
      }
      .question-block:hover {
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }
      .btn-add {
        border: 2px dashed var(--accent-blue);
        color: var(--accent-blue);
        font-weight: bold;
      }
      .btn-add:hover {
        background: var(--accent-blue);
        color: white;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-dark shadow-sm mb-4">
      <div class="container">
        <a class="navbar-brand" href="/dashboard">🛡️ AegisQuiz Builder</a>
        <span class="text-white">Manual Mode</span>
      </div>
    </nav>

    <div class="container pb-5">
      <div class="row justify-content-center">
        <div class="col-lg-9">
          <form action="/teacher/create-manual" method="POST">
            <div class="card builder-card shadow-sm mb-4">
              <div class="card-body p-4">
                <h4 class="mb-4 fw-bold">Quiz Information</h4>
                <div class="row g-3">
                  <div class="col-md-7">
                    <label class="form-label fw-semibold">Quiz Title</label>
                    <input
                      type="text"
                      name="quiz_title"
                      class="form-control"
                      placeholder="e.g. Midterm History Exam"
                      required
                    />
                  </div>
                  <div class="col-md-5">
                    <label class="form-label fw-semibold">Topic</label>
                    <input
                      type="text"
                      name="topic"
                      class="form-control"
                      placeholder="e.g. Ancient Rome"
                      required
                    />
                  </div>
                  <div class="mb-4">
                    <label class="form-label fw-bold">Quiz Duration (Minutes)</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-secondary">⏱</span>
                        <input type="number" name="duration" class="form-control bg-white text-dark border-secondary" 
                               placeholder="e.g. 30" min="1" required>
                        <span class="input-group-text bg-white border-secondary">min</span>
                    </div>
                    <div class="form-text text-muted">Auto-submits when time expires.</div>
                  </div>
                </div>
              </div>
            </div>

            <div id="question-container">
              <div
                class="card builder-card shadow-sm mb-3 question-block p-4"
                id="q-block-1"
              >
                <div class="d-flex justify-content-between">
                  <h5 class="fw-bold text-primary">Question 1</h5>
                </div>
                <input
                  type="text"
                  name="question[]"
                  class="form-control mb-3 mt-2"
                  placeholder="Write your question here..."
                  required
                />

                <div class="row g-3">
                  <div class="col-md-6">
                    <div class="input-group">
                      <span class="input-group-text bg-white">A</span>
                      <input
                        type="text"
                        name="opt_a[]"
                        class="form-control"
                        placeholder="Option A"
                        required
                      />
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="input-group">
                      <span class="input-group-text bg-white">B</span>
                      <input
                        type="text"
                        name="opt_b[]"
                        class="form-control"
                        placeholder="Option B"
                        required
                      />
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="input-group">
                      <span class="input-group-text bg-white">C</span>
                      <input
                        type="text"
                        name="opt_c[]"
                        class="form-control"
                        placeholder="Option C"
                        required
                      />
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="input-group">
                      <span class="input-group-text bg-white">D</span>
                      <input
                        type="text"
                        name="opt_d[]"
                        class="form-control"
                        placeholder="Option D"
                        required
                      />
                    </div>
                  </div>
                </div>

                <div class="mt-3">
                  <label class="form-label fw-bold text-success"
                    >Select Correct Answer</label
                  >
                  <select name="correct[]" class="form-select w-25">
                    <option value="A">Option A</option>
                    <option value="B">Option B</option>
                    <option value="C">Option C</option>
                    <option value="D">Option D</option>
                  </select>
                </div>
              </div>
            </div>

            <div class="d-grid gap-2 mb-5">
              <button
                type="button"
                class="btn btn-add py-3"
                onclick="addQuestion()"
              >
                + Add Another Question
              </button>
              <button type="submit" class="btn btn-primary btn-lg py-3 shadow">
                🚀 Publish Manual Quiz
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script>
      let questionCount = 1;

      function addQuestion() {
        questionCount++;
        const container = document.getElementById("question-container");
        const originalBlock = document.getElementById("q-block-1");
        const newBlock = originalBlock.cloneNode(true);

        // Update ID and Title
        newBlock.id = `q-block-${questionCount}`;
        newBlock.querySelector("h5").innerText = `Question ${questionCount}`;

        // Clear all input values
        const inputs = newBlock.querySelectorAll("input");
        inputs.forEach((input) => (input.value = ""));

        container.appendChild(newBlock);

        // Smooth scroll to new question
        newBlock.scrollIntoView({ behavior: "smooth" });
      }
    </script>
  </body>
</html>
