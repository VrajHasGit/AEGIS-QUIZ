<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AegisQuiz | Teacher Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #060b18;
      --surface: rgba(15, 23, 42, 0.8);
      --border: rgba(99, 120, 180, 0.2);
      --accent: #4f7ef8;
      --accent-glow: rgba(79, 126, 248, 0.4);
      --text: #f1f5f9;
      --muted: #64748b;
      --success: #10b981;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated background orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      animation: floatOrb 12s ease-in-out infinite;
    }
    .orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(79,126,248,0.15) 0%, transparent 70%);
      top: -150px; left: -150px;
      animation-delay: 0s;
    }
    .orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.12) 0%, transparent 70%);
      bottom: -100px; right: -100px;
      animation-delay: -4s;
    }
    .orb-3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(16, 185, 129, 0.08) 0%, transparent 70%);
      top: 50%; left: 60%;
      animation-delay: -8s;
    }
    @keyframes floatOrb {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -30px) scale(1.05); }
      66% { transform: translate(-20px, 20px) scale(0.95); }
    }

    /* Grid overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(79, 126, 248, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79, 126, 248, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
    }

    .login-wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      padding: 20px;
      animation: slideUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .brand-badge {
      text-align: center;
      margin-bottom: 32px;
    }
    .shield-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #4f7ef8, #7c3aed);
      border-radius: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 0 30px var(--accent-glow);
      margin-bottom: 16px;
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 30px var(--accent-glow); }
      50% { box-shadow: 0 0 50px var(--accent-glow), 0 0 80px rgba(79,126,248,0.2); }
    }
    .brand-title {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.5px;
    }
    .brand-title span { color: var(--accent); }
    .brand-sub {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 4px;
      font-weight: 400;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 36px;
      backdrop-filter: blur(20px);
      box-shadow: 0 25px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .card-heading {
      font-size: 1rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .card-heading::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .field-group {
      margin-bottom: 20px;
    }
    .field-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .field-input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1.5px solid rgba(99, 120, 180, 0.2);
      border-radius: 12px;
      padding: 13px 16px;
      color: var(--text);
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
    }
    .field-input::placeholder { color: rgba(100,116,139,0.6); }
    .field-input:focus {
      border-color: var(--accent);
      background: rgba(79,126,248,0.05);
      box-shadow: 0 0 0 4px rgba(79,126,248,0.12);
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #4f7ef8, #6d48e5);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 0.95rem;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
      margin-top: 8px;
      letter-spacing: 0.5px;
    }
    .btn-login::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(79,126,248,0.4);
    }
    .btn-login:hover::before { opacity: 1; }
    .btn-login:active { transform: translateY(0); }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 24px 0;
    }

    .student-link {
      text-align: center;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .student-link a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }
    .student-link a:hover { color: #7aa3ff; }

    .security-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 24px;
      font-size: 0.75rem;
      color: rgba(100,116,139,0.7);
    }
    .security-badge::before, .security-badge::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(99,120,180,0.1);
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="login-wrapper">
    <div class="brand-badge">
      <div class="shield-icon">🛡️</div>
      <div class="brand-title">Aegis<span>Quiz</span></div>
      <div class="brand-sub">Secure Examination Platform</div>
    </div>

    <div class="login-card">
      <div class="card-heading">Teacher Portal</div>

      <form action="/login" method="POST">
        <div class="field-group">
          <label class="field-label" for="email">Email Address</label>
          <input type="email" id="email" name="email" class="field-input" placeholder="you@institution.edu" required />
        </div>
        <div class="field-group">
          <label class="field-label" for="password">Password</label>
          <input type="password" id="password" name="password" class="field-input" placeholder="••••••••••" required />
        </div>
        <button type="submit" class="btn-login">Sign In to Dashboard →</button>
      </form>

      <div class="divider"></div>

      <div class="student-link">
        Are you a student? <a href="/student/join">Enter Quiz Code</a>
      </div>
    </div>

    <div class="security-badge">🔐 AES-256 Encrypted Session</div>
  </div>
</body>
</html>
