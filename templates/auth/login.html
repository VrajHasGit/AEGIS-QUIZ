<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AegisQuiz | Teacher Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #060b18;
      --surface: rgba(15, 23, 42, 0.8);
      --border: rgba(99, 120, 180, 0.2);
      --accent: #4f7ef8;
      --accent-glow: rgba(79, 126, 248, 0.4);
      --text: #f1f5f9;
      --muted: #64748b;
      --success: #10b981;
      --danger: #ef4444;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated gradient background */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: linear-gradient(
        135deg,
        rgba(79,126,248,0.05) 0%,
        rgba(124,58,237,0.05) 25%,
        rgba(16,185,129,0.04) 50%,
        rgba(245,158,11,0.03) 75%,
        rgba(79,126,248,0.05) 100%
      );
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      pointer-events: none;
    }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Grid overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(79, 126, 248, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79, 126, 248, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
    }

    /* Particle Canvas */
    #particles {
      position: fixed; inset: 0; z-index: 1;
      pointer-events: none;
    }

    .login-wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 440px;
      padding: 20px;
      animation: slideUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .brand-badge {
      text-align: center;
      margin-bottom: 32px;
    }
    .shield-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #4f7ef8, #7c3aed);
      border-radius: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 0 30px var(--accent-glow);
      margin-bottom: 16px;
      animation: breathe 4s ease-in-out infinite;
    }
    @keyframes breathe {
      0%, 100% { box-shadow: 0 0 30px var(--accent-glow); transform: scale(1) rotate(0deg); }
      50% { box-shadow: 0 0 60px var(--accent-glow), 0 0 100px rgba(124,58,237,0.2); transform: scale(1.05) rotate(2deg); }
    }
    .brand-title {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.5px;
    }
    .brand-title span { color: var(--accent); }
    .brand-sub {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 4px;
      font-weight: 400;
    }

    /* Card with animated gradient border */
    .login-card {
      position: relative;
      background: var(--surface);
      border-radius: 24px;
      padding: 36px;
      backdrop-filter: blur(20px);
      box-shadow: 0 25px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
      overflow: hidden;
    }
    .login-card::before {
      content: '';
      position: absolute; inset: -1px;
      background: conic-gradient(
        from var(--angle, 0deg),
        transparent 0%,
        rgba(79,126,248,0.5) 10%,
        rgba(124,58,237,0.5) 20%,
        transparent 30%,
        transparent 70%,
        rgba(16,185,129,0.4) 80%,
        rgba(79,126,248,0.5) 90%,
        transparent 100%
      );
      border-radius: 24px;
      z-index: -1;
      animation: rotateBorder 6s linear infinite;
    }
    @property --angle {
      syntax: '<angle>';
      initial-value: 0deg;
      inherits: false;
    }
    @keyframes rotateBorder {
      to { --angle: 360deg; }
    }
    .login-card::after {
      content: '';
      position: absolute; inset: 1px;
      background: var(--surface);
      border-radius: 23px;
      z-index: -1;
    }

    /* Tab Switcher */
    .tab-switcher {
      display: flex; gap: 0; margin-bottom: 28px;
      background: rgba(255,255,255,0.04);
      border-radius: 12px; padding: 4px;
      border: 1px solid var(--border);
    }
    .tab-btn {
      flex: 1; padding: 10px;
      border: none; border-radius: 10px;
      background: transparent;
      color: var(--muted); font-family: 'Inter', sans-serif;
      font-size: 0.85rem; font-weight: 600;
      cursor: pointer; transition: all 0.3s;
    }
    .tab-btn.active {
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      color: white;
      box-shadow: 0 4px 15px rgba(79,126,248,0.3);
    }
    .tab-btn:not(.active):hover { color: var(--text); }

    /* Form Panels */
    .form-panel { display: none; animation: fadeSlide 0.35s cubic-bezier(0.22,1,0.36,1); }
    .form-panel.active { display: block; }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .field-group { margin-bottom: 20px; }
    .field-label {
      display: block;
      font-size: 0.8rem; font-weight: 600;
      color: var(--muted);
      text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .field-input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1.5px solid rgba(99, 120, 180, 0.2);
      border-radius: 12px;
      padding: 13px 16px;
      color: var(--text);
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
    }
    .field-input::placeholder { color: rgba(100,116,139,0.6); }
    .field-input:focus {
      border-color: var(--accent);
      background: rgba(79,126,248,0.05);
      box-shadow: 0 0 0 4px rgba(79,126,248,0.12);
    }

    /* Password row */
    .field-row { display: flex; gap: 12px; }
    .field-row .field-group { flex: 1; }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #4f7ef8, #6d48e5);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 0.95rem;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
      margin-top: 8px;
      letter-spacing: 0.5px;
    }
    .btn-primary.register-btn {
      background: linear-gradient(135deg, var(--success), #059669);
    }
    .btn-primary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(79,126,248,0.4);
    }
    .btn-primary.register-btn:hover {
      box-shadow: 0 10px 30px rgba(16,185,129,0.4);
    }
    .btn-primary:hover::before { opacity: 1; }
    .btn-primary:active { transform: translateY(0); }

    /* Ripple effect */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transform: scale(0);
      animation: rippleAnim 0.6s ease-out;
      pointer-events: none;
    }
    @keyframes rippleAnim {
      to { transform: scale(4); opacity: 0; }
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 24px 0;
    }

    .student-link {
      text-align: center;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .student-link a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }
    .student-link a:hover { color: #7aa3ff; }

    .security-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 24px;
      font-size: 0.75rem;
      color: rgba(100,116,139,0.7);
    }
    .security-badge::before, .security-badge::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(99,120,180,0.1);
    }

    /* Flash message */
    .flash-message {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 0.85rem; font-weight: 600;
      margin-bottom: 20px;
      animation: fadeSlide 0.3s ease;
    }
    .flash-success {
      background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.3);
      color: var(--success);
    }
    .flash-error {
      background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
    }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>

  <div class="login-wrapper">
    <div class="brand-badge">
      <div class="shield-icon">🛡️</div>
      <div class="brand-title">Aegis<span>Quiz</span></div>
      <div class="brand-sub">Secure Examination Platform</div>
    </div>

    <div class="login-card">
      <!-- Tab Switcher -->
      <div class="tab-switcher">
        <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
        <button class="tab-btn" onclick="switchTab('register')">Create Account</button>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="flash-message flash-{{ category }}">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <!-- Login Panel -->
      <div id="panel-login" class="form-panel active">
        <form action="/login" method="POST">
          <div class="field-group">
            <label class="field-label" for="login-email">Email Address</label>
            <input type="email" id="login-email" name="email" class="field-input" placeholder="you@institution.edu" required />
          </div>
          <div class="field-group">
            <label class="field-label" for="login-password">Password</label>
            <input type="password" id="login-password" name="password" class="field-input" placeholder="••••••••••" required />
          </div>
          <button type="submit" class="btn-primary" onclick="createRipple(event)">Sign In to Dashboard →</button>
        </form>
      </div>

      <!-- Register Panel -->
      <div id="panel-register" class="form-panel">
        <form action="/register" method="POST" onsubmit="return validateRegister()">
          <div class="field-group">
            <label class="field-label" for="reg-name">Full Name</label>
            <input type="text" id="reg-name" name="username" class="field-input" placeholder="Dr. Jane Smith" required />
          </div>
          <div class="field-group">
            <label class="field-label" for="reg-email">Email Address</label>
            <input type="email" id="reg-email" name="email" class="field-input" placeholder="you@institution.edu" required />
          </div>
          <div class="field-row">
            <div class="field-group">
              <label class="field-label" for="reg-pass">Password</label>
              <input type="password" id="reg-pass" name="password" class="field-input" placeholder="••••••••" required minlength="6" />
            </div>
            <div class="field-group">
              <label class="field-label" for="reg-confirm">Confirm</label>
              <input type="password" id="reg-confirm" name="confirm_password" class="field-input" placeholder="••••••••" required minlength="6" />
            </div>
          </div>
          <button type="submit" class="btn-primary register-btn" onclick="createRipple(event)">Create Teacher Account ✓</button>
        </form>
      </div>

      <div class="divider"></div>

      <div class="student-link">
        Are you a student? <a href="/student/join">Enter Quiz Code</a>
      </div>
    </div>

    <div class="security-badge">🔐 AES-256 Encrypted Session</div>
  </div>

  <script>
    // === Tab Switching ===
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById(`panel-${tab}`).classList.add('active');
    }

    // === Registration Validation ===
    function validateRegister() {
      const pass = document.getElementById('reg-pass').value;
      const confirm = document.getElementById('reg-confirm').value;
      if (pass !== confirm) {
        alert('Passwords do not match!');
        return false;
      }
      if (pass.length < 6) {
        alert('Password must be at least 6 characters.');
        return false;
      }
      return true;
    }

    // === Ripple Effect ===
    function createRipple(event) {
      const btn = event.currentTarget;
      const circle = document.createElement('span');
      const rect = btn.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      circle.style.width = circle.style.height = size + 'px';
      circle.style.left = (event.clientX - rect.left - size/2) + 'px';
      circle.style.top = (event.clientY - rect.top - size/2) + 'px';
      circle.classList.add('ripple');
      btn.appendChild(circle);
      setTimeout(() => circle.remove(), 600);
    }

    // === Particle Animation ===
    (function() {
      const canvas = document.getElementById('particles');
      const ctx = canvas.getContext('2d');
      let w, h, particles = [];
      const PARTICLE_COUNT = 60;
      const CONNECTION_DIST = 120;
      const colors = ['rgba(79,126,248,0.6)', 'rgba(124,58,237,0.5)', 'rgba(16,185,129,0.4)'];

      function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();

      for (let i = 0; i < PARTICLE_COUNT; i++) {
        particles.push({
          x: Math.random() * w,
          y: Math.random() * h,
          vx: (Math.random() - 0.5) * 0.5,
          vy: (Math.random() - 0.5) * 0.5,
          r: Math.random() * 2 + 1,
          color: colors[Math.floor(Math.random() * colors.length)]
        });
      }

      function draw() {
        ctx.clearRect(0, 0, w, h);

        // Update and draw particles
        for (let p of particles) {
          p.x += p.vx;
          p.y += p.vy;
          if (p.x < 0 || p.x > w) p.vx *= -1;
          if (p.y < 0 || p.y > h) p.vy *= -1;

          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.fill();
        }

        // Draw connections
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < CONNECTION_DIST) {
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.strokeStyle = `rgba(79,126,248,${0.15 * (1 - dist/CONNECTION_DIST)})`;
              ctx.lineWidth = 0.5;
              ctx.stroke();
            }
          }
        }

        requestAnimationFrame(draw);
      }
      draw();
    })();
  </script>
</body>
</html>
