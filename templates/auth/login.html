<!DOCTYPE html>
<html lang="en">
  <head>
    <title>AegisQuiz | Teacher Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: #f4f7f6;
        display: flex;
        align-items: center;
        height: 100vh;
      }
      .login-card {
        width: 100%;
        max-width: 400px;
        padding: 20px;
        margin: auto;
      }
    </style>
  </head>
  <body>
    <div class="card login-card shadow">
      <div class="card-body">
        <h2 class="text-center mb-4">🛡️ AegisQuiz</h2>
        <form action="/login" method="POST">
          <div class="mb-3">
            <label>Email address</label>
            <input type="email" name="email" class="form-control" required />
          </div>
          <div class="mb-3">
            <label>Password</label>
            <input
              type="password"
              name="password"
              class="form-control"
              required
            />
          </div>
          <button type="submit" class="btn btn-primary w-100">
            Login as Teacher
          </button>
        </form>
        <div class="mt-3 text-center">
          <small
            >Are you a student?
            <a href="/student/join">Enter Quiz Code</a></small
          >
        </div>
      </div>
    </div>
  </body>
</html>
