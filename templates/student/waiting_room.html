<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Waiting Room | AegisQuiz</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  </head>
  <body class="bg-light text-center" style="padding-top: 100px">
    <div class="container">
      <div
        class="spinner-border text-primary mb-4"
        style="width: 3rem; height: 3rem"
        role="status"
      ></div>
      <h2 class="display-6">Hold on, {{ session['student_name'] }}!</h2>
      <p class="text-muted">
        The teacher is currently validating students. The exam will start
        automatically.
      </p>

      <div class="alert alert-info d-inline-block px-5 mt-4">
        <strong>Exam Protocol:</strong> Full-screen mode will be enforced once
        the test begins.
      </div>
    </div>

    <script>
      const socket = io();
      const quizId = "{{ session['quiz_id'] }}";

      // Join the specific room for this quiz
      socket.emit("join_room", { quiz_id: quizId });

      // Listen for the "Force Start" from the teacher
      socket.on("force_start", function () {
        window.location.href = "/exam";
      });
    </script>
  </body>
</html>
